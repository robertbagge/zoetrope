name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Build
        run: cargo build --release -p zoetrope-cli

      - name: Package
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          cd target/release
          tar czf ../../zoetrope-${TAG}-aarch64-apple-darwin.tar.gz zoetrope
          cd ../..

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          gh release upload "$TAG" \
            "zoetrope-${TAG}-aarch64-apple-darwin.tar.gz"

  update-homebrew:
    needs: [release-please, build]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download release assets and update tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          export VERSION="${TAG#v}"

          gh release download "$TAG" --repo robertbagge/zoetrope \
            --pattern "zoetrope-${TAG}-aarch64-apple-darwin.tar.gz"

          export SHA=$(shasum -a 256 "zoetrope-${TAG}-aarch64-apple-darwin.tar.gz" | cut -d' ' -f1)

          git clone "https://x-access-token:${GH_TOKEN}@github.com/robertbagge/homebrew-tap.git" tap

          envsubst '${VERSION} ${TAG} ${SHA}' < .github/formula.rb.tmpl > tap/Formula/zoetrope.rb

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/zoetrope.rb
          git commit -m "chore: update zoetrope to ${VERSION}"
          git push
