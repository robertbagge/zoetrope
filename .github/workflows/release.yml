name: Release

on:
  push:
    branches: [main]

jobs:
  release-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11 # v0.5.128
        with:
          command: release-pr
          version: "0.3.157"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.extract.outputs.tag }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - id: release
        uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11 # v0.5.128
        with:
          command: release
          version: "0.3.157"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - id: extract
        if: steps.release.outputs.releases_created == 'true'
        env:
          RELEASES: ${{ steps.release.outputs.releases }}
        run: |
          TAG=$(echo "$RELEASES" | jq -r '.[0].tag')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build:
    needs: release
    if: needs.release.outputs.tag != ''
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-13
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.release.outputs.tag }}

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        env:
          TARGET: ${{ matrix.target }}
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          cd target/${TARGET}/release
          tar czf ../../../zoetrope-${TAG}-${TARGET}.tar.gz zoetrope
          cd ../../..

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release.outputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          gh release upload "$TAG" \
            "zoetrope-${TAG}-${TARGET}.tar.gz"

  update-homebrew:
    needs: [release, build]
    if: needs.release.outputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download release assets and update tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          export VERSION="${TAG#v}"

          gh release download "$TAG" --repo robertbagge/zoetrope \
            --pattern "zoetrope-${TAG}-aarch64-apple-darwin.tar.gz" \
            --pattern "zoetrope-${TAG}-x86_64-apple-darwin.tar.gz"

          export SHA_ARM=$(shasum -a 256 "zoetrope-${TAG}-aarch64-apple-darwin.tar.gz" | cut -d' ' -f1)
          export SHA_INTEL=$(shasum -a 256 "zoetrope-${TAG}-x86_64-apple-darwin.tar.gz" | cut -d' ' -f1)

          git clone "https://x-access-token:${GH_TOKEN}@github.com/robertbagge/homebrew-tap.git" tap

          envsubst '${VERSION} ${TAG} ${SHA_ARM} ${SHA_INTEL}' < .github/formula.rb.tmpl > tap/Formula/zoetrope.rb

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/zoetrope.rb
          git commit -m "chore: update zoetrope to ${VERSION}"
          git push
