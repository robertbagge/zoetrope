name: Release

on:
  push:
    branches: [main]

jobs:
  release-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11 # v0.5.128
        with:
          command: release-pr
          version: "0.3.157"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.extract.outputs.tag }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - id: release
        uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11 # v0.5.128
        with:
          command: release
          version: "0.3.157"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - id: extract
        if: steps.release.outputs.releases_created == 'true'
        run: |
          TAG=$(echo '${{ steps.release.outputs.releases }}' | jq -r '.[0].tag')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build:
    needs: release
    if: needs.release.outputs.tag != ''
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-13
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.release.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../zoetrope-${{ needs.release.outputs.tag }}-${{ matrix.target }}.tar.gz zoetrope
          cd ../../..

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ needs.release.outputs.tag }} \
            zoetrope-${{ needs.release.outputs.tag }}-${{ matrix.target }}.tar.gz

  update-homebrew:
    needs: [release, build]
    if: needs.release.outputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets and update tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="${{ needs.release.outputs.tag }}"
          VERSION="${TAG#v}"

          gh release download "$TAG" --repo robertbagge/zoetrope \
            --pattern "zoetrope-${TAG}-aarch64-apple-darwin.tar.gz" \
            --pattern "zoetrope-${TAG}-x86_64-apple-darwin.tar.gz"

          SHA_ARM=$(shasum -a 256 "zoetrope-${TAG}-aarch64-apple-darwin.tar.gz" | cut -d' ' -f1)
          SHA_INTEL=$(shasum -a 256 "zoetrope-${TAG}-x86_64-apple-darwin.tar.gz" | cut -d' ' -f1)

          git clone https://x-access-token:${GH_TOKEN}@github.com/robertbagge/homebrew-tap.git tap
          cd tap

          cat > Formula/zoetrope.rb << FORMULA
class Zoetrope < Formula
  desc "Convert .mov files to high-quality gifs using ffmpeg"
  homepage "https://github.com/robertbagge/zoetrope"
  version "${VERSION}"
  license "MIT"

  depends_on "ffmpeg"

  on_macos do
    if Hardware::CPU.arm?
      url "https://github.com/robertbagge/zoetrope/releases/download/${TAG}/zoetrope-${TAG}-aarch64-apple-darwin.tar.gz"
      sha256 "${SHA_ARM}"
    elsif Hardware::CPU.intel?
      url "https://github.com/robertbagge/zoetrope/releases/download/${TAG}/zoetrope-${TAG}-x86_64-apple-darwin.tar.gz"
      sha256 "${SHA_INTEL}"
    end
  end

  def install
    bin.install "zoetrope"
  end

  test do
    assert_match "Convert .mov files", shell_output("#{bin}/zoetrope --help")
  end
end
FORMULA

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/zoetrope.rb
          git commit -m "chore: update zoetrope to ${VERSION}"
          git push
